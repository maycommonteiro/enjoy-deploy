<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enjoy Work — Deploy Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --navy: #00131F; --gold: #B18C54; --gold-light: #C9A96E;
    --white: #FFFFFF; --gray: #8A9BAA; --success: #2ECC71;
    --error: #E74C3C; --surface: #021A2B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 700px; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--gold); letter-spacing: 0.02em; }
  .subtitle { font-size: 0.85rem; color: var(--gray); margin-top: 0.3rem; font-weight: 300; }
  .card { background: var(--surface); border: 1px solid rgba(177,140,84,0.2); border-radius: 16px; padding: 2rem; }
  .step { display: flex; gap: 1rem; align-items: flex-start; margin-bottom: 1.5rem; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(177,140,84,0.15); border: 1px solid var(--gold); color: var(--gold); font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 0.2rem; }
  .step-content { flex: 1; }
  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  input[type="text"], textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 0.7rem 1rem; transition: border-color 0.2s; outline: none; }
  input:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; min-height: 200px; font-size: 0.8rem; font-family: 'Courier New', monospace; }
  .file-drop { border: 2px dashed rgba(177,140,84,0.3); border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .file-drop:hover, .file-drop.drag-over { border-color: var(--gold); background: rgba(177,140,84,0.05); }
  .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .file-drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .file-drop-text { font-size: 0.85rem; color: var(--gray); }
  .file-drop-text strong { color: var(--gold); }
  .file-name { margin-top: 0.5rem; font-size: 0.8rem; color: var(--success); display: none; }
  .or-divider { text-align: center; color: var(--gray); font-size: 0.75rem; margin: 1rem 0; position: relative; }
  .or-divider::before, .or-divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: rgba(255,255,255,0.08); }
  .or-divider::before { left: 0; } .or-divider::after { right: 0; }
  .btn-deploy { width: 100%; padding: 1rem; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 1.5rem; letter-spacing: 0.02em; }
  .btn-deploy:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
  .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status-box { margin-top: 1rem; padding: 0.9rem 1.2rem; border-radius: 8px; font-size: 0.85rem; display: none; align-items: center; gap: 0.7rem; }
  .status-box.show { display: flex; }
  .status-box.loading { background: rgba(177,140,84,0.1); border: 1px solid rgba(177,140,84,0.3); color: var(--gold); }
  .status-box.success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: var(--success); }
  .status-box.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: var(--error); }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(177,140,84,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.5rem 0; }
  .info-chip { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(177,140,84,0.1); border: 1px solid rgba(177,140,84,0.25); border-radius: 20px; padding: 0.25rem 0.75rem; font-size: 0.75rem; color: var(--gold); margin-bottom: 1rem; }
  .footer-note { text-align: center; margin-top: 1.2rem; font-size: 0.75rem; color: var(--gray); }
  .live-link { color: var(--gold); text-decoration: none; font-weight: 500; }
  .live-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Enjoy Work Coworking</div>
    <div class="subtitle">Deploy automático → GitHub Pages</div>
  </div>
  <div class="card">
    <div class="info-chip">🚀 Pronto para publicar — apenas selecione o arquivo</div>

    <div class="step">
      <div class="step-num">1</div>
      <div class="step-content">
        <label>Repositório (usuário/repo)</label>
        <input type="text" id="repo" value="maycommonteiro/EnjoyCowork-Relat-rio-financeiro" />
        <div style="margin-top:0.8rem">
          <label>Arquivo no repositório</label>
          <input type="text" id="filepath" value="index.html" />
        </div>
      </div>
    </div>

    <div class="step">
      <div class="step-num">2</div>
      <div class="step-content">
        <label>Novo HTML do dashboard</label>
        <div class="file-drop" id="dropZone">
          <input type="file" id="fileInput" accept=".html,.htm" onchange="handleFile(this)" />
          <div class="file-drop-icon">📄</div>
          <div class="file-drop-text">Arraste o <strong>index.html</strong> aqui<br>ou clique para selecionar</div>
          <div class="file-name" id="fileName"></div>
        </div>
        <div class="or-divider">ou cole o HTML abaixo</div>
        <textarea id="htmlContent" placeholder="Cole o conteúdo HTML aqui..."></textarea>
      </div>
    </div>

    <div class="step">
      <div class="step-num">3</div>
      <div class="step-content">
        <label>Mensagem do commit</label>
        <input type="text" id="commitMsg" value="Atualiza dashboard financeiro" />
      </div>
    </div>

    <div class="divider"></div>
    <button class="btn-deploy" onclick="deploy()">🚀 Publicar no GitHub Pages</button>

    <div class="status-box loading" id="statusLoading">
      <div class="spinner"></div>
      <span id="loadingText">Enviando para o GitHub...</span>
    </div>
    <div class="status-box success" id="statusSuccess">
      ✅ <span id="successText"></span>
    </div>
    <div class="status-box error" id="statusError">
      ❌ <span id="errorText"></span>
    </div>
  </div>

  <div class="footer-note">
    Após o deploy, acesse:
    <a class="live-link" href="https://maycommonteiro.github.io/EnjoyCowork-Relat-rio-financeiro/" target="_blank">
      maycommonteiro.github.io/EnjoyCowork-Relat-rio-financeiro
    </a>
  </div>
</div>

<script>
  const GH_TOKEN = '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';

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  function handleFile(input) { if (input.files[0]) readFile(input.files[0]); }

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('htmlContent').value = e.target.result;
      const fn = document.getElementById('fileName');
      fn.textContent = '✓ ' + file.name + ' carregado';
      fn.style.display = 'block';
    };
    reader.readAsText(file);
  }

  function setStatus(type, text) {
    ['Loading','Success','Error'].forEach(t => document.getElementById('status'+t).classList.remove('show'));
    if (type) {
      document.getElementById('status'+type).classList.add('show');
      if (type === 'Loading') document.getElementById('loadingText').textContent = text;
      if (type === 'Success') document.getElementById('successText').textContent = text;
      if (type === 'Error') document.getElementById('errorText').textContent = text;
    }
  }

  async function deploy() {
    const repo = document.getElementById('repo').value.trim();
    const filepath = document.getElementById('filepath').value.trim();
    const html = document.getElementById('htmlContent').value.trim();
    const msg = document.getElementById('commitMsg').value.trim() || 'Atualiza dashboard';

    if (!repo) return setStatus('Error', 'Informe o repositório.');
    if (!html) return setStatus('Error', 'Sem conteúdo HTML para enviar.');

    const btn = document.querySelector('.btn-deploy');
    btn.disabled = true;
    setStatus('Loading', 'Obtendo SHA do arquivo atual...');

    try {
      const [owner, repoName] = repo.split('/');
      const baseUrl = `https://api.github.com/repos/${owner}/${repoName}/contents/${filepath}`;
      const headers = {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      let sha = null;
      const getRes = await fetch(baseUrl, { headers });
      if (getRes.ok) {
        sha = (await getRes.json()).sha;
      } else if (getRes.status !== 404) {
        throw new Error((await getRes.json()).message || 'Erro ao buscar arquivo');
      }

      setStatus('Loading', 'Enviando novo HTML para o GitHub...');

      const encoded = btoa(unescape(encodeURIComponent(html)));
      const body = { message: msg, content: encoded };
      if (sha) body.sha = sha;

      const putRes = await fetch(baseUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
      if (!putRes.ok) throw new Error((await putRes.json()).message || 'Erro no upload');

      const now = new Date().toLocaleTimeString('pt-BR');
      setStatus('Success', `Publicado com sucesso às ${now}! O site atualiza em ~1 minuto.`);
    } catch (e) {
      setStatus('Error', e.message || 'Erro desconhecido.');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
